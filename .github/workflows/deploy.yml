
name: CI/CD Pipeline

on:
  push:
    branches:
      - '**' # All branches trigger build
    tags:
      - 'v*' # Tags starting with 'v' trigger build
  pull_request:
    branches:
      - main # PR to main triggers build

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/seo-checker-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/seo-checker-web

jobs:
  # ---- Build & Test (runs on ALL branches and PRs) ----
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @seo-checker/shared-types build

      - name: Build seo-engine
        run: pnpm --filter @seo-checker/seo-engine build

      - name: Build API
        run: pnpm --filter @seo-checker/api build

      - name: Build Web
        run: pnpm --filter @seo-checker/web build

  # ---- E2E Tests ----
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @seo-checker/web exec playwright install --with-deps chromium

      - name: Build packages
        run: |
          pnpm --filter @seo-checker/shared-types build
          pnpm --filter @seo-checker/seo-engine build

      - name: Start Redis
        run: |
          docker run -d -p 6379:6379 redis:7-alpine

      - name: Start API
        run: |
          pnpm --filter @seo-checker/api build
          pnpm --filter @seo-checker/api start &
          npx wait-on http://localhost:3000/health --timeout 30000
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run E2E Tests
        run: pnpm --filter @seo-checker/web test:e2e
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: failure() # Only upload on failure
        with:
          name: playwright-screenshots
          path: apps/web/test-results/
          retention-days: 7
  # ---- Build & Push Docker Images ----
  publish:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Debug tag
        run: echo "Tag is ${{ steps.tag.outputs.tag }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Deploy to VPS ----
  deploy:
    name: Deploy to VPS
    environment: production
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.yml"
          target: "/var/www/seo-checker"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/seo-checker

            echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.repository_owner }}" \
              --password-stdin
            
            # Write .env file from GitHub secrets
            cat > .env << EOF
            NODE_ENV=production
            PORT=3000
            REDIS_HOST=redis
            REDIS_PORT=6379
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            EOF

            export IMAGE_TAG=${{ steps.tag.outputs.tag }}

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af

            echo "✅ Deployed ${{ steps.tag.outputs.tag }} successfully!"