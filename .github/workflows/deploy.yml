name: CI/CD Pipeline

on:
  push:
    branches:
      - '**' # All branches trigger build
    tags:
      - 'v*' # Tags starting with 'v' trigger build
  pull_request:
    branches:
      - main # PR to main triggers build

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/seo-checker-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/seo-checker-web

jobs:
  # ---- Build & Test (runs on ALL branches and PRs) ----
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @seo-checker/shared-types build

      - name: Build seo-engine
        run: pnpm --filter @seo-checker/seo-engine build

      - name: Build API
        run: pnpm --filter @seo-checker/api build

      - name: Build Web
        run: pnpm --filter @seo-checker/web build

  # ---- Build & Push Docker Images ----
  publish:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') # Only runs when tag is pushed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ needs.tag.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ needs.tag.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Deploy to VPS ----
  deploy:
    name: Deploy to VPS
    environment: production
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v') # Only runs when tag is pushed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.yml"
          target: "/var/www/seo-checker"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/seo-checker

            echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.repository_owner }}" \
              --password-stdin

            export IMAGE_TAG=${{ needs.tag.outputs.new_tag }}

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af

            echo "✅ Deployed ${{ needs.tag.outputs.new_tag }} successfully!"