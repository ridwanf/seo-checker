version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: seo-checker-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
  api:
    image: ghcr.io/ridwanf/seo-checker-api:${IMAGE_TAG:-latest}
    container_name: seo-checker-api
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: ghcr.io/ridwanf/seo-checker-web:${IMAGE_TAG:-latest}
    container_name: seo-checker-web
    ports:
      - "3002:80"
    restart: unless-stopped


volumes:
  redis_data: